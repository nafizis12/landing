<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Redirecting...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .loader { width: 50px; height: 50px; border: 5px solid #1f2937; border-top-color: #facc15; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="text-center">
        <div class="loader mx-auto mb-6"></div>
        <h2 id="offer-text" class="text-xl font-bold text-yellow-400">🎁 রিওয়ার্ড প্রসেস হচ্ছে...</h2>
        <p class="text-gray-400 text-sm mt-2">দয়া করে ১ সেকেন্ড অপেক্ষা করুন</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, setDoc, increment, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // ১. আপনার দেওয়া কনফিগারেশন
        const CONFIG = {
            MAX_ACCESS: 3, 
            TRASH_URL: "https://www.google.com", 
            AD_LINKS: [
                "https://brewingeasel.com/exb2js3wf7?key=8dec1fe6817c7208022c2ca0c1282a48",
                "https://brewingeasel.com/ftv2xc7x?key=27c75bb93182e2bb211de9041eb9af29",
                "https://brewingeasel.com/ernsznt05?key=332c0a7f259871b6175edce3ff0158af",
                "https://brewingeasel.com/sbt5ttfmm?key=22887dfac4b92d2faf02e0a7ad7675f4",
                "https://brewingeasel.com/biwhfqzsw?key=81d11cc23b8a94096e0fcb0136f4841e",
                "https://omg10.com/4/10842462",
                "https://omg10.com/4/10842461",
                "https://omg10.com/4/7303129",
                "https://omg10.com/4/7303833",
                "https://omg10.com/4/7460253"
            ],
            FIREBASE: { 
                apiKey: "AIzaSyCU2RfLeclEyyxzEActtl5ks1P_NPvATOE", 
                authDomain: "ns-prime-d7ca5.firebaseapp.com",
                projectId: "ns-prime-d7ca5"
            }
        };

        const OFFERS = [
            "💸 ১০০০ টাকা বোনাস কনফার্ম হচ্ছে...",
            "🔞 ভিডিওটি প্লে হচ্ছে, অপেক্ষা করুন...",
            "🎁 আপনার রিওয়ার্ডটি রেডি হচ্ছে...",
            "💎 ভিআইপি অফার আনলক হচ্ছে..."
        ];

        document.getElementById('offer-text').innerText = OFFERS[Math.floor(Math.random() * OFFERS.length)];

        const app = initializeApp(CONFIG.FIREBASE);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const refCode = params.get('ref') || params.get('u');

        async function runFastLogic() {
            // ১. বট চেক (ইন্সট্যান্ট)
            if (navigator.webdriver) { window.location.replace(CONFIG.TRASH_URL); return; }

            const today = new Date().toDateString();
            let localCount = parseInt(localStorage.getItem('v_cnt')) || 0;
            let localDate = localStorage.getItem('v_date');

            // ২. লোকাল স্টোরেজ লিমিট চেক
            if (localDate === today && localCount >= CONFIG.MAX_ACCESS) {
                window.location.replace(CONFIG.TRASH_URL);
                return;
            }

            try {
                // ৩. আইপি এবং ডাটাবেজ ভেরিফিকেশন (Fast Parallel Fetch)
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const userIP = ipData.ip.replace(/\./g, '_');

                const ipDocRef = doc(db, "ip_logs", userIP);
                const ipSnap = await getDoc(ipDocRef);

                if (ipSnap.exists()) {
                    const data = ipSnap.data();
                    if (data.date === today && data.count >= CONFIG.MAX_ACCESS) {
                        window.location.replace(CONFIG.TRASH_URL);
                        return;
                    }
                    await setDoc(ipDocRef, { count: data.date === today ? increment(1) : 1, date: today }, { merge: true });
                } else {
                    await setDoc(ipDocRef, { count: 1, date: today });
                }

                // ৪. ব্যালেন্স ট্র্যাকিং (আগের ল্যান্ডিং পেজের লজিক অনুযায়ী)
                if (refCode) {
                    await trackBalance();
                }

                // ৫. লোকাল কাউন্ট আপডেট
                localStorage.setItem('v_date', today);
                localStorage.setItem('v_cnt', localDate === today ? localCount + 1 : 1);

                // ৬. ফাইনাল রিডাইরেক্ট (১.২ সেকেন্ড ডিলে যাতে ডাটাবেজ রাইট শেষ হয়)
                const finalUrl = CONFIG.AD_LINKS[Math.floor(Math.random() * CONFIG.AD_LINKS.length)];
                setTimeout(() => {
                    window.location.replace(finalUrl);
                }, 1200);

            } catch (e) {
                // এরর হ্যান্ডেলিং: সিস্টেম ফেইল করলে ট্রাফিক লস না করে সরাসরি অ্যাড-এ পাঠানো
                console.error("System sync error");
                window.location.replace(CONFIG.AD_LINKS[0]);
            }
        }

        async function trackBalance() {
            try {
                const [settingsSnap, userSnap] = await Promise.all([
                    getDoc(doc(db, "settings", "config")),
                    getDoc(doc(db, "users", refCode))
                ]);

                let globalCpm = settingsSnap.exists() ? (settingsSnap.data().globalCpm || 0) : 0;
                let userCustomCpm = (userSnap.exists() && userSnap.data().customCpm > 0) ? userSnap.data().customCpm : 0;
                let earning = (userCustomCpm > 0 ? userCustomCpm : globalCpm) / 1000;

                // ল্যান্ডিং পেজের মতো সব ডাটা একবারে আপডেট
                await setDoc(doc(db, "users", refCode), {
                    rawTotalImpressions: increment(1),
                    rawTodayImpressions: increment(1),
                    validClicks: increment(1),
                    totalClicks: increment(1), // বাটন ক্লিকের বিকল্প হিসেবে সরাসরি ক্লিক কাউন্ট
                    balance: increment(earning),
                    todayEarning: increment(earning),
                    totalEarnings: increment(earning),
                    lastActive: serverTimestamp()
                }, { merge: true });
            } catch (err) {
                console.log("Tracking error:", err);
            }
        }

        runFastLogic();
    </script>
</body>
</html>
