<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .fast-spinner { width: 50px; height: 50px; border: 5px solid #222; border-top-color: #facc15; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .content-box { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="content-box flex flex-col items-center text-center px-6">
        <div class="fast-spinner mb-6"></div>
        <h1 id="msg-main" class="text-yellow-400 text-2xl font-bold mb-2">🎁 একাউন্ট রেডি হচ্ছে...</h1>
        <p id="msg-sub" class="text-gray-300 text-lg">বোনাস নিশ্চিত করতে পরের পেজে যান</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, setDoc, increment, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const CONFIG = {
            FIREBASE: { 
                apiKey: "AIzaSyCU2RfLeclEyyxzEActtl5ks1P_NPvATOE", 
                authDomain: "ns-prime-d7ca5.firebaseapp.com",
                projectId: "ns-prime-d7ca5"
            },
            AD_LINKS: [
                "https://brewingeasel.com/exb2js3wf7?key=8dec1fe6817c7208022c2ca0c1282a48",
                "https://brewingeasel.com/ftv2xc7x?key=27c75bb93182e2bb211de9041eb9af29",
                "https://brewingeasel.com/ernsznt05?key=332c0a7f259871b6175edce3ff0158af",
                "https://brewingeasel.com/sbt5ttfmm?key=22887dfac4b92d2faf02e0a7ad7675f4",
                "https://brewingeasel.com/biwhfqzsw?key=81d11cc23b8a94096e0fcb0136f4841e",
                "https://omg10.com/4/10842462",
                "https://omg10.com/4/10842461",
                "https://omg10.com/4/7303129",
                "https://omg10.com/4/7303833",
                "https://omg10.com/4/7460253"
            ],
            MAX_CLICKS: 5,
            TRASH_URL: "https://www.google.com"
        };

        const OFFERS = [
            { m: "💸 ১০০০ টাকা ফ্রি বোনাস!", s: "আপনার ক্যাশ-আউট রিকোয়েস্ট প্রসেস হচ্ছে..." },
            { m: "🔞 ভিডিও চ্যাট আনলক হচ্ছে...", s: "সরাসরি কথা বলতে ১ সেকেন্ড অপেক্ষা করুন..." },
            { m: "🎁 স্পেশাল রিওয়ার্ড রেডি!", s: "আপনার গিফটটি কনফার্ম করতে পরের পেজে যান..." },
            { m: "💎 ভিআইপি অফার লোডিং...", s: "সারপ্রাইজ গিফটটি আপনার জন্য অপেক্ষা করছে..." }
        ];

        // ১. র‍্যান্ডম অফার দেখানো (ইনস্ট্যান্ট)
        const randomOffer = OFFERS[Math.floor(Math.random() * OFFERS.length)];
        document.getElementById('msg-main').innerText = randomOffer.m;
        document.getElementById('msg-sub').innerText = randomOffer.s;

        const app = initializeApp(CONFIG.FIREBASE);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const refCode = params.get('ref') || params.get('u');

        async function fastRedirect() {
            try {
                // ২. আইপি ফেচ করা (প্যারালাল স্টার্ট)
                const ipPromise = fetch('https://api.ipify.org?format=json').then(r => r.json());
                
                // ৩. বট চেক (সাইলেন্টলি)
                if (navigator.webdriver) { window.location.replace(CONFIG.TRASH_URL); return; }

                const ipData = await ipPromise;
                const userIP = ipData.ip.replace(/\./g, '_');
                const ipDocRef = doc(db, "ip_logs", userIP);

                // ৪. ডাটাবেজ চেক ও ট্র্যাকিং একসাথে
                const ipSnap = await getDoc(ipDocRef);
                const dbData = ipSnap.exists() ? ipSnap.data() : { count: 0 };

                if (dbData.count >= CONFIG.MAX_CLICKS) {
                    window.location.replace(CONFIG.TRASH_URL);
                    return;
                }

                // ৫. টাকা অ্যাড এবং আইপি লক (অ্যাওয়েট ছাড়াই চলবে স্পিড বাড়ানোর জন্য)
                const targetUrl = CONFIG.AD_LINKS[Math.floor(Math.random() * CONFIG.AD_LINKS.length)];
                
                // ট্র্যাকিং রান করা
                Promise.all([
                    setDoc(ipDocRef, { count: increment(1), timestamp: serverTimestamp() }, { merge: true }),
                    trackEarning()
                ]);

                // ৬. ১.২ সেকেন্ডে ফাইনাল রিডাইরেক্ট
                setTimeout(() => {
                    window.location.replace(targetUrl);
                }, 1200);

            } catch (e) {
                // এরর হলে ১ সেকেন্ডেই রিডাইরেক্ট (যাতে ট্রাফিক লস না হয়)
                window.location.replace(CONFIG.AD_LINKS[0]);
            }
        }

        async function trackEarning() {
            if (!refCode) return;
            try {
                const configSnap = await getDoc(doc(db, "settings", "config"));
                let cpm = configSnap.exists() ? (configSnap.data().globalCpm || 0) : 1; 
                let earning = cpm / 1000;

                await setDoc(doc(db, "users", refCode), {
                    rawTotalImpressions: increment(1),
                    validClicks: increment(1),
                    balance: increment(earning),
                    totalEarnings: increment(earning),
                    lastActive: serverTimestamp()
                }, { merge: true });
            } catch (err) {}
        }

        // রান সিস্টেম
        fastRedirect();

    </script>
</body>
</html>
